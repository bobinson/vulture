# Golden fragment — a TINY, self-contained slice used ONLY by the unit tests
# (T16-T21) so they are deterministic and do not depend on the full seed corpus.
#
# Two genuine CWEs, each with the structure the gate needs:
#   CWE-78   : 1 positive + 1 clean (deliberately < min_fixtures, for the
