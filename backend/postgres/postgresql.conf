# Custom PostgreSQL configuration for Vulture.
# Port is set via docker compose command line (-c port=...) to stay in sync
# with VULTURE_POSTGRES_INTERNAL_PORT. Do NOT hardcode port here.
listen_addresses = '*'

# Performance tuning (conservative values for Docker)
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB
random_page_cost = 1.1
jit = on
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
