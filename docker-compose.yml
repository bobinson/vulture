services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "${VULTURE_POSTGRES_HOST_PORT:-25433}:${VULTURE_POSTGRES_INTERNAL_PORT:-25432}"
    environment:
      - POSTGRES_USER=${VULTURE_DB_USER:-vulture}
      - POSTGRES_PASSWORD=${VULTURE_DB_PASSWORD:?VULTURE_DB_PASSWORD must be set}
      - POSTGRES_DB=${VULTURE_DB_NAME:-vulture}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema migrations are applied by the Go backend at startup
      # (see backend/internal/repository/migrations). The previous
      # `/docker-entrypoint-initdb.d` mount only fired on fresh data
      # volumes and aborted mid-replay on errors — feature 0040
      # replaced it with an in-binary runner that's always authoritative.
      - ./backend/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf", "-c", "port=${VULTURE_POSTGRES_INTERNAL_PORT:-25432}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VULTURE_DB_USER:-vulture} -p ${VULTURE_POSTGRES_INTERNAL_PORT:-25432}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${VULTURE_FRONTEND_HOST:-23001}:${VULTURE_FRONTEND_INTERNAL:-23000}"
    environment:
      - NGINX_ENVSUBST_FILTER=VULTURE_
      - VULTURE_FRONTEND_INTERNAL=${VULTURE_FRONTEND_INTERNAL:-23000}
      - VULTURE_BACKEND_PORT=${VULTURE_BACKEND_PORT:-28080}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${VULTURE_FRONTEND_INTERNAL:-23000}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${VULTURE_BACKEND_PORT:-28080}:${VULTURE_BACKEND_PORT:-28080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VULTURE_PORT=${VULTURE_BACKEND_PORT:-28080}
      - VULTURE_LOCAL_MODE=${VULTURE_LOCAL_MODE:-false}
      - VULTURE_API_KEYS_ENABLED=${VULTURE_API_KEYS_ENABLED:-false}
      - VULTURE_REQUIRE_LLM=${VULTURE_REQUIRE_LLM:-false}
      - VULTURE_USE_LLM=${VULTURE_USE_LLM:-false}
      - VULTURE_WEBHOOK_SECRET=${VULTURE_WEBHOOK_SECRET:-}
      - VULTURE_DB_DSN=postgres://${VULTURE_DB_USER:-vulture}:${VULTURE_DB_PASSWORD:?VULTURE_DB_PASSWORD must be set}@postgres:${VULTURE_POSTGRES_INTERNAL_PORT:-25432}/${VULTURE_DB_NAME:-vulture}?sslmode=${VULTURE_DB_SSLMODE:-disable}
      - VULTURE_AGENT_CHAOS_URL=http://agent-chaos:${VULTURE_AGENT_CHAOS_PORT:-28001}
      - VULTURE_AGENT_OWASP_URL=http://agent-owasp:${VULTURE_AGENT_OWASP_PORT:-28002}
      - VULTURE_AGENT_SOC2_URL=http://agent-soc2:${VULTURE_AGENT_SOC2_PORT:-28003}
      - VULTURE_AGENT_CWE_URL=http://agent-cwe:${VULTURE_AGENT_CWE_PORT:-28004}
      - VULTURE_AGENT_PROVE_URL=http://agent-prove:${VULTURE_AGENT_PROVE_PORT:-28005}
      - VULTURE_AGENT_XSS_URL=http://agent-xss:${VULTURE_AGENT_XSS_PORT:-28006}
      - VULTURE_AGENT_SSDF_URL=http://agent-ssdf:${VULTURE_AGENT_SSDF_PORT:-28007}
      - VULTURE_AGENT_DISCOVER_URL=http://agent-discover:${VULTURE_AGENT_DISCOVER_PORT:-28008}
      - VULTURE_AGENT_DO178C_URL=http://agent-do178c:${VULTURE_AGENT_DO178C_PORT:-28009}
      - VULTURE_AGENT_ASVS_URL=http://agent-asvs:${VULTURE_AGENT_ASVS_PORT:-28010}
      - "VULTURE_JWT_SECRET=${VULTURE_JWT_SECRET:?VULTURE_JWT_SECRET must be set - generate with openssl rand -hex 32}"
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - VULTURE_EMBEDDING_URL=${VULTURE_EMBEDDING_URL}
      - VULTURE_EMBEDDING_MODEL=${VULTURE_EMBEDDING_MODEL:-text-embedding-3-small}
      - VULTURE_LLM_MODEL=${VULTURE_LLM_MODEL:-}
      - VULTURE_LLM_CTX_SIZE=${VULTURE_LLM_CTX_SIZE:-}
      - VULTURE_LLM_MAX_OUTPUT_TOKENS=${VULTURE_LLM_MAX_OUTPUT_TOKENS:-}
      - VULTURE_LOOP_GLOBAL_LIMIT=${VULTURE_LOOP_GLOBAL_LIMIT:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${VULTURE_BACKEND_PORT:-28080}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    volumes:
      - source-cache:/tmp/sources
      - ${VULTURE_SOURCE_DIR:-./}:/mnt/source:ro
    depends_on:
      postgres:
        condition: service_healthy
      agent-chaos:
        condition: service_healthy
      agent-owasp:
        condition: service_healthy
      agent-soc2:
        condition: service_healthy
      agent-cwe:
        condition: service_healthy
      agent-prove:
        condition: service_healthy
      agent-xss:
        condition: service_healthy
      agent-ssdf:
        condition: service_healthy
