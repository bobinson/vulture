services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=vulture
      - POSTGRES_PASSWORD=REDACTED-PG-PW
      - POSTGRES_DB=vulture
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulture"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VULTURE_PORT=8080
      - VULTURE_DB_DSN=postgres://vulture:REDACTED-PG-PW@postgres:5432/vulture?sslmode=disable
      - VULTURE_AGENT_CHAOS_URL=http://agent-chaos:8001
      - VULTURE_AGENT_OWASP_URL=http://agent-owasp:8002
      - VULTURE_AGENT_SOC2_URL=http://agent-soc2:8003
      - VULTURE_AGENT_CWE_URL=http://agent-cwe:8004
      - VULTURE_JWT_SECRET=${VULTURE_JWT_SECRET:-REDACTED-JWT-DEFAULT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VULTURE_EMBEDDING_URL=${VULTURE_EMBEDDING_URL}
      - VULTURE_EMBEDDING_MODEL=${VULTURE_EMBEDDING_MODEL}
    volumes:
      - source-cache:/tmp/sources
      - /home:/home:ro
    depends_on:
      postgres:
        condition: service_healthy
      agent-chaos:
        condition: service_started
      agent-owasp:
        condition: service_started
      agent-soc2:
        condition: service_started
      agent-cwe:
        condition: service_started
    restart: unless-stopped

  agent-chaos:
    build:
      context: ./agents
      dockerfile: chaos_engineering/Dockerfile
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - VULTURE_LLM_MODEL=${VULTURE_LLM_MODEL:-gpt-4o}
      - VULTURE_USE_LLM=${VULTURE_USE_LLM:-false}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - VULTURE_AGENT_PORT=8001
      - VULTURE_BACKEND_URL=http://backend:8080
    volumes:
      - source-cache:/tmp/sources:ro
      - /home:/home:ro
    restart: unless-stopped

  agent-owasp:
    build:
      context: ./agents
      dockerfile: owasp/Dockerfile
    ports:
      - "8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - VULTURE_LLM_MODEL=${VULTURE_LLM_MODEL:-gpt-4o}
      - VULTURE_USE_LLM=${VULTURE_USE_LLM:-false}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - VULTURE_AGENT_PORT=8002
      - VULTURE_BACKEND_URL=http://backend:8080
    volumes:
      - source-cache:/tmp/sources:ro
      - /home:/home:ro
    restart: unless-stopped

  agent-soc2:
    build:
      context: ./agents
      dockerfile: soc2/Dockerfile
    ports:
      - "8003:8003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - VULTURE_LLM_MODEL=${VULTURE_LLM_MODEL:-gpt-4o}
      - VULTURE_USE_LLM=${VULTURE_USE_LLM:-false}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - VULTURE_AGENT_PORT=8003
      - VULTURE_BACKEND_URL=http://backend:8080
    volumes:
      - source-cache:/tmp/sources:ro
      - /home:/home:ro
    restart: unless-stopped

  agent-cwe:
    build:
      context: ./agents
      dockerfile: cwe/Dockerfile
    ports:
      - "8004:8004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - VULTURE_LLM_MODEL=${VULTURE_LLM_MODEL:-gpt-4o}
      - VULTURE_USE_LLM=${VULTURE_USE_LLM:-false}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - VULTURE_AGENT_PORT=8004
      - VULTURE_BACKEND_URL=http://backend:8080
    volumes:
      - source-cache:/tmp/sources:ro
      - /home:/home:ro
    restart: unless-stopped

volumes:
  pgdata:
  source-cache:
