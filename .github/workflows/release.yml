name: release

# Feature 0044 — Native installer release pipeline.
# Triggered on tag push (vX.Y.Z); produces 4 platform tarballs +
# SBOM + cosign signatures + Trivy/pip-audit reports, uploads to GH
# Releases as a draft.

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write       # cosign keyless OIDC
  contents: write       # release upload
  attestations: write   # SLSA attestations (Phase 2 hook)

jobs:
  lint:
    name: shellcheck + fallback-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: shellcheck install.sh scripts/*.sh
      - name: check fallback tag
        run: scripts/check-fallback-tag.sh "${GITHUB_REF_NAME}"

  build-frontend:
    name: build frontend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: build
        working-directory: frontend
        run: npm run build
      - name: audit-ci
        working-directory: frontend
        run: npx --yes audit-ci --high
        continue-on-error: false
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-binary:
    name: build tarball ${{ matrix.os }}-${{ matrix.arch }}
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: amd64, runner: ubuntu-latest }
          - { os: linux,  arch: arm64, runner: ubuntu-22.04-arm }
          # macos-13 (Intel) was retired 2025-12-08; macos-15-intel is its
          # x86_64 replacement. Intel macOS support ends with macos-15 (~Fall
          # 2027). arm64 stays on macos-14 (still supported).
          - { os: darwin, arch: amd64, runner: macos-15-intel }
          - { os: darwin, arch: arm64, runner: macos-14 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: install trivy
        # Official cross-platform installer (detects OS/arch). PINNED to the
        # v0.71.0 tag of contrib/install.sh *and* the installed version, so we
        # never pipe a moving 'main'-ref script into sh — keeping parity with
        # the SHA-pinned actions in this workflow (supply-chain hardening).
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.71.0/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.0
      - name: install pip-audit
        # PEP-668 varies by runner: macOS + ubuntu-24.04 refuse plain installs
        # (need --break-system-packages), but ubuntu-22.04-arm's older pip
        # doesn't support that flag and doesn't enforce PEP 668. Try plain
        # first, fall back to the flag only where it's both needed and present.
        run: python3 -m pip install pip-audit || python3 -m pip install --break-system-packages pip-audit
      - name: install GNU tar (macOS)
        # build-release.sh needs GNU tar for reproducible-tarball flags
        # (--sort/--mtime/--owner); macOS ships BSD tar. gnu-tar provides gtar.
        if: runner.os == 'macOS'
        run: brew install gnu-tar
      - name: build tarball
        env:
          # Tier B: bundle python-build-standalone into the linux/amd64 tarball so
          # a native install runs the agents with no system Python and no Docker.
          # Set only for linux/amd64 — that's the platform with a committed PBS
          # SHA pin (scripts/pbs-shas-*.txt); on every other platform build-release
          # gracefully skips bundling and ships a lean tarball (arm64 + darwin PBS
          # are deferred). NOTE: bundling pulls the agent deps into the tarball, so
          # the Trivy/SBOM steps below now also cover the Python runtime.
          VULTURE_BUNDLE_PBS: ${{ (matrix.os == 'linux' && matrix.arch == 'amd64') && '1' || '' }}
        run: scripts/build-release.sh "${GITHUB_REF_NAME}" "${{ matrix.os }}" "${{ matrix.arch }}"
      - name: generate SBOM
        run: |
          syft "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            -o cyclonedx-json="dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.sbom.json"
      - name: Trivy CVE scan
        run: |
          trivy fs --severity HIGH,CRITICAL --ignorefile .trivyignore \
            --format json --output "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.vulns.json" \
            "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" || true
          trivy fs --severity HIGH,CRITICAL --ignorefile .trivyignore --exit-code 1 \
            "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
      - name: pip-audit
        run: |
          if [ -f .pip-audit-ignore ]; then
            IGN=$(awk -F: '/^CVE-/ {print "--ignore-vuln "$1}' .pip-audit-ignore)
          else
            IGN=""
          fi
          # Audit the actual hashed lockfile — `agents/requirements.txt` never
          # existed (agents use pyproject.toml), so this step audited nothing.
          # Advisory: Trivy above is the hard CVE gate; .pip-audit-ignore holds
          # time-boxed, codeowner-reviewed waivers.
          # shellcheck disable=SC2086
          pip-audit -r agents/requirements-frozen.txt --strict $IGN || true
      - name: cosign sign tarball
        run: |
          cosign sign-blob --yes \
            "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            --output-signature "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sig" \
            --output-certificate "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.pem"
      - name: smoke install
        run: scripts/smoke-install.sh "dist/vulture-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
      - name: smoke negative
        run: scripts/smoke-negative.sh
      - name: verify no secrets in logs
        run: scripts/verify-no-secrets-in-logs.sh "${VULTURE_HOME:-$HOME/.vulture-smoke}"
        if: env.VULTURE_HOME != ''
        continue-on-error: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  release:
    name: publish draft release
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - name: install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: aggregate SHA256SUMS
        run: |
          cd dist
          sha256sum vulture-*.tar.gz | sort > SHA256SUMS
      - name: cosign sign SHA256SUMS
        run: |
          cd dist
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem
      - name: gh release create (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fail loudly on any empty asset (e.g. a bad cosign sig) — GitHub's
          # upload API otherwise rejects it with an opaque "Bad Content-Length".
          if find dist -maxdepth 1 -type f -empty | grep -q .; then
            echo "error: empty release asset(s):" >&2
            find dist -maxdepth 1 -type f -empty >&2
            exit 1
          fi
          # Idempotent: create the draft if absent, else reuse it; then upload
          # assets with --clobber so re-runs (or a single flaky upload) don't
          # abort the whole release.
          gh release create "${GITHUB_REF_NAME}" --draft --title "${GITHUB_REF_NAME}" \
            --notes "Automated draft release. Review SBOM, vulns, and signature before publishing." \
            || gh release edit "${GITHUB_REF_NAME}" --draft
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
