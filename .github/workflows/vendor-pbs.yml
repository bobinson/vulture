name: vendor-pbs

# Feature 0044 S9 — re-host python-build-standalone as our own
# release asset so install.sh and build-release.sh never reach
# indygreg/python-build-standalone at install time.
#
# Manually triggered. Dual-control: restricted to main branch +
# requires `release` environment approval before upload.

on:
  workflow_dispatch:
    inputs:
      pbs_version:
        description: "python-build-standalone tag (e.g. 20240814)"
        required: true
        default: "20260610"
      python_version:
        description: "Python version (e.g. 3.12.13)"
        required: true
        default: "3.12.13"

permissions:
  contents: write     # release upload
  id-token: write     # cosign keyless OIDC (mirrors release.yml)

jobs:
  vendor:
    name: re-host PBS
    runs-on: ubuntu-latest
    environment: release    # requires second-human approval
    # Restricted to the project's default branch (main, or master
    # during the rename transition). Feature-branch dispatches are
    # rejected to keep a malicious branch out of the vendor pipeline.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    strategy:
      matrix:
        include:
          - { triple: x86_64-unknown-linux-gnu,        platform: linux-amd64 }
          - { triple: aarch64-unknown-linux-gnu,       platform: linux-arm64 }
          - { triple: x86_64-apple-darwin,             platform: darwin-amd64 }
          - { triple: aarch64-apple-darwin,            platform: darwin-arm64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: download upstream PBS
        run: |
          URL="https://github.com/indygreg/python-build-standalone/releases/download/${{ inputs.pbs_version }}/cpython-${{ inputs.python_version }}+${{ inputs.pbs_version }}-${{ matrix.triple }}-install_only.tar.gz"
          # Retry + cap runtime so a flaky/hanging upstream can't stall the job
          # (matches build-release.sh's curl posture).
          curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --max-time 600 \
            -o pbs.tar.gz "$URL"
      - name: verify SHA against committed manifest
        run: |
          # scripts/pbs-shas-<tag>.txt: one line per asset: <sha256>  <asset-filename>
          # Column 2 is the FULL upstream asset name (cpython-<pyver>+<tag>-<triple>-install_only.tar.gz),
          # so key the lookup on that exact name — NOT the bare triple — mirroring
          # build-release.sh's `awk -v f="$PBS_ASSET" '$2==f'` against the same pin.
          MANIFEST="scripts/pbs-shas-${{ inputs.pbs_version }}.txt"
          [ -f "$MANIFEST" ] || { echo "missing $MANIFEST"; exit 1; }
          ASSET="cpython-${{ inputs.python_version }}+${{ inputs.pbs_version }}-${{ matrix.triple }}-install_only.tar.gz"
          EXPECTED=$(awk -v f="$ASSET" '$2==f {print $1}' "$MANIFEST")
          [ -n "$EXPECTED" ] || { echo "no SHA committed for asset $ASSET"; exit 1; }
          ACTUAL=$(sha256sum pbs.tar.gz | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "SHA mismatch: $ACTUAL != $EXPECTED"; exit 1
          fi
      - name: rename for our release
        run: mv pbs.tar.gz "cpython-${{ inputs.python_version }}+${{ inputs.pbs_version }}-${{ matrix.platform }}-install_only.tar.gz"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pbs-${{ matrix.platform }}
          path: cpython-*.tar.gz

  publish:
    name: publish vendor release
    needs: vendor
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: pbs-*
          merge-multiple: true
      - name: aggregate SHA256SUMS
        run: sha256sum cpython-*.tar.gz > SHA256SUMS
      - name: install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: cosign sign SHA256SUMS
        # Keyless/OIDC signature over the aggregate SHA256SUMS (mirrors how
        # release.yml signs its SHA256SUMS). Consumers verify the vendored
        # tarballs by checking this signature over SHA256SUMS, then matching
        # each tarball's digest against it.
        run: |
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem
      - name: create immutable vendor release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="vendor-pbs-${{ inputs.pbs_version }}"
          gh release create "$TAG" \
            --title "python-build-standalone ${{ inputs.pbs_version }} (vendored)" \
            --notes "Re-hosted upstream artifacts for installer use. Cosign-signed (keyless). See feature 0044 S9." \
            cpython-*.tar.gz SHA256SUMS SHA256SUMS.sig SHA256SUMS.pem
