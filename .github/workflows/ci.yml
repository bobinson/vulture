name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.24"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Go Backend ──────────────────────────────────────────────

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Lint Go
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          working-directory: backend
          version: v1.64.8   # pin for reproducible lint (matches backend/.golangci.yml schema)

  # ── Native installer (feature 0055 H8) ──────────────────────

  lint-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: shellcheck install.sh scripts/*.sh scripts/tests/*.sh
      - name: install.sh branch tests
        run: sh scripts/tests/test_install_sh.sh
      - name: docs-honesty tests
        run: sh scripts/tests/test_docs_honesty.sh

  build-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: cd backend && go build -o bin/vulture ./cmd/vulture/

  test-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test with coverage
        run: cd backend && go test ./... -coverprofile=coverage.out -covermode=atomic
      - name: Coverage report (target high; informational, not gated)
        run: |
          cd backend
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Backend coverage: ${COVERAGE} — target is high; monitored, not gated (see CONTRIBUTING.md)"
      - name: Complexity report (target < 10; informational, not gated)
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          echo "Functions over cyclomatic complexity 9 (target < 10; monitored, not gated):"
          (cd backend && gocyclo -over 9 .) || true
          echo "--- top 10 ---"; (cd backend && gocyclo -top 10 .) || true

  # ── Python Agents ───────────────────────────────────────────

  lint-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python
        run: cd agents && ruff check .

  test-agents:
    runs-on: ubuntu-latest
    needs: lint-agents
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        # shared[dev] pulls the test stack (pytest, pytest-asyncio, pytest-cov,
        # httpx, anyio) at the versions pinned in shared/pyproject.toml; the
        # other packages share that stack, so plain editable installs suffice.
        run: cd agents && pip install -e "shared/[dev]" && pip install -e chaos_engineering/ && pip install -e owasp/ && pip install -e soc2/ && pip install -e cwe/ && pip install -e prove/ && pip install -e xss/ && pip install -e ssdf/ && pip install -e discover/
      - name: Test agents
        # Run each package separately: collecting all trees in one pytest
        # invocation collides on duplicate test-file basenames (e.g.
        # test_skills.py) under prepend import mode, since the test dirs have
        # no __init__.py. Per-package runs avoid the collision.
        run: |
          cd agents
          for pkg in shared chaos_engineering owasp soc2 cwe prove xss ssdf discover; do
            echo "::group::pytest $pkg"
            python -m pytest "$pkg/tests/" -v || exit 1
            echo "::endgroup::"
          done
      - name: Complexity report (target < C; informational, not gated)
        run: |
          pip install radon
          echo "Functions at complexity grade C or worse (target < C; monitored, not gated):"
          (cd agents && radon cc . -nc --exclude=".venv/*") || true

  # ── Frontend ────────────────────────────────────────────────

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint (ESLint)
        run: cd frontend && npm run lint

  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build

  test-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Test
        run: cd frontend && npm test

  # ── Docker Build Verification ───────────────────────────────

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-agents, test-frontend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # NOTE: deliberately NOT using docker/setup-buildx-action. It creates an
      # isolated docker-container builder that can't see the locally-built
      # vulture-agent-base:latest, so the agent images (FROM it) would try to
      # pull it from a registry and fail. The default 'docker' driver shares
      # the daemon image store, so the base built below is visible to compose.
      - name: Build agent base image
        # The agent images are FROM vulture-agent-base:latest, a locally-built
        # base (agents/Dockerfile.base), not a registry image; it must exist
        # before `docker compose build` or the agent targets fail to resolve it.
        run: docker build -t vulture-agent-base:latest -f agents/Dockerfile.base agents/
      - name: Build all Docker images
        env:
          VULTURE_DB_PASSWORD: ci-test-password
          VULTURE_JWT_SECRET: ci-test-jwt-secret-placeholder
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: docker compose build
      - name: Verify images were created
        run: |
          docker images | grep vulture || true
          echo "Docker build verification passed"
