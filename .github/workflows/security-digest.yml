# .github/workflows/security-digest.yml — 0056 C5: dispatch-only security digest.
#
# Renders a proactive open-vulnerability digest (pip-audit over the locked deps +
# open Dependabot alerts) to the run summary and keeps ONE rolling tracking issue
# up to date. Additive + advisory: a missed digest blocks nothing (Trivy in CI +
# the C4 pre-tag gate remain the enforcement).
#
# workflow_dispatch ONLY — NO cron (LLD §0/§7), same dead-cron rationale as
# relock.yml: a solo repo's schedules die silently after 60 days of inactivity,
# so the staleness detector would be killed by the very event it should detect.
#
# Dependabot-alerts token (audit M2 — IMPORTANT): the /dependabot/alerts endpoint
# is NOT readable by the default GITHUB_TOKEN (`security-events: read` is
# code-scanning only; the endpoint 403s even at `write-all`). Reading alerts here
# requires a PAT or GitHub App token with fine-grained `security_events: read`,
# stored as the `DEPENDABOT_ALERTS_TOKEN` secret. Weigh that secret's blast
# radius before wiring it into any RECURRING workflow — a reason this stays
# dispatch-only. Absent token / a 403 => the digest renders pip-audit only and
# notes the missing alert feed.

name: security-digest

on:
  workflow_dispatch: {}          # dispatch-only; NO schedule:/cron:

permissions:
  issues: write                  # open/update the single tracking issue
  contents: read
  # NO id-token / signing scope.

concurrency:
  group: security-digest         # one digest run at a time
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python3 -m pip install pip-audit || python3 -m pip install --break-system-packages pip-audit

      - name: pip-audit the locked dependency set
        run: |
          {
            echo "## Security digest — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "### pip-audit (agents/requirements-frozen.txt)"
            echo '```'
            # Honor the .pip-audit-ignore allowlist (CVE/GHSA/PYSEC/OSV — audit M9).
            IGN=""
            if [ -f .pip-audit-ignore ]; then
              IGN=$(awk '/^[[:space:]]*(CVE|GHSA|PYSEC|OSV)-/ {sub(/^[[:space:]]+/,""); split($0,p,/[: \t]/); if (p[1]!="") printf " --ignore-vuln %s", p[1]}' .pip-audit-ignore)
            fi
            # shellcheck disable=SC2086
            pip-audit -r agents/requirements-frozen.txt $IGN 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Audit the capped Darwin cryptography pin (folded former C6)
        run: |
          # The constraint file pins Darwin cryptography to a capped version
          # (newest with an Intel-mac wheel). The structural guard (split line
          # present + universal mode) lives in gen-lockfile.sh and runs in C1;
          # here we add the FORWARD-LOOKING CVE check so the manual cap can't
          # silently rot into a vulnerable version.
          CAP=$(awk -F'==' '/^cryptography==/ {sub(/[; ].*$/,"",$2); print $2; exit}' agents/lockfile-constraints.txt)
          {
            echo
            echo "### Capped Darwin cryptography pin"
            echo '```'
            if [ -n "$CAP" ]; then
              echo "auditing cryptography==$CAP (Darwin cap from lockfile-constraints.txt)"
              printf 'cryptography==%s\n' "$CAP" > /tmp/darwin-cap.txt
              pip-audit -r /tmp/darwin-cap.txt 2>&1 || true
            else
              echo "no Darwin cryptography cap found in lockfile-constraints.txt"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open Dependabot alerts (needs DEPENDABOT_ALERTS_TOKEN PAT — M2)
        env:
          # M2: the default GITHUB_TOKEN CANNOT read /dependabot/alerts (403).
          # Provide a PAT/App token with security_events:read as this secret.
          GH_TOKEN: ${{ secrets.DEPENDABOT_ALERTS_TOKEN }}
        run: |
          {
            echo
            echo "### Open Dependabot alerts"
            if [ -z "${GH_TOKEN:-}" ]; then
              echo "_DEPENDABOT_ALERTS_TOKEN not set — the default GITHUB_TOKEN cannot read /dependabot/alerts (403). Alert feed omitted; see pip-audit above._"
            else
              echo '```'
              gh api "/repos/${GITHUB_REPOSITORY}/dependabot/alerts?state=open" \
                --jq '.[] | "[" + (.security_advisory.severity // "?") + "] " + (.security_advisory.ghsa_id // "?") + " — " + (.dependency.package.name // "?")' \
                2>&1 || echo "(alert read failed — treat a 403 as a missing/over-scoped token, not network down)"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update the rolling tracking issue (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: find the ONE issue by its stable title, then update it,
          # else create it. Never a blind `gh issue create` (that would spam a
          # new issue every run).
          TITLE="Security: open dependency advisories"
          BODY="Auto-generated by security-digest.yml (dispatch-only). See the latest run summary for the full pip-audit + Dependabot-alerts digest. Run #${GITHUB_RUN_ID}."
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -n1)
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
            echo "updated tracking issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label dependencies
            echo "created tracking issue"
          fi
